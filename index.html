<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Auth Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container{
    width:370px;
    padding:30px;
    background: rgba(0,0,0,0.75);
    border-radius:20px;
    backdrop-filter: blur(15px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    color:#fff;
    display:none;
}

#loginSection{
    display:block;
}

h2,h3{
    text-align:center;
    margin-bottom:15px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:#fff;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg, #8e2de2, #4a00e0);
    color:#fff;
    cursor:pointer;
    transition:0.2s;
    font-weight:500;
}

button:hover{
    transform:scale(1.05);
}

.small-btn{
    width:auto;
    padding:8px 14px;
    margin:5px;
}

.level-buttons{
    text-align:center;
    margin-bottom:10px;
}

#exerciseImage{
    width:100%;
    height:260px;
    object-fit:contain;
    background:#ffffff;
    padding:15px;
    border-radius:18px;
    margin:10px 0;
}

.message{
    text-align:center;
    font-size:14px;
    margin-bottom:10px;
}

.error{
    color:#ff6b6b;
}

#quoteBox{
    margin-top:10px;
    font-style:italic;
    text-align:center;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="loginSection">
    <h2 id="formTitle">Login</h2>
    <div class="message" id="authMessage"></div>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="handleAuth()">Login</button>
    <button onclick="toggleForm()" class="small-btn">Switch to Sign Up</button>
</div>

<!-- CHALLENGE -->
<div class="container" id="challengeSection">

<h3>Welcome, <span id="displayUser"></span> 👋</h3>
<h2>🔥 Fitness Challenge</h2>

<div class="level-buttons">
<button class="small-btn" onclick="generateChallenge('easy')">Easy</button>
<button class="small-btn" onclick="generateChallenge('moderate')">Moderate</button>
<button class="small-btn" onclick="generateChallenge('hard')">Hard</button>
</div>

<h3 id="exerciseName"></h3>
<img id="exerciseImage" src="">
<p id="exerciseDescription"></p>

<button id="completeBtn" style="display:none;">Mark as Completed</button>
<p id="challengeMessage"></p>

<h3>🔥 Streak: <span id="streakCount">0</span></h3>
<p id="quoteBox">Complete a challenge to see motivation!</p>

<button onclick="logout()" class="small-btn">Logout</button>
</div>

<script>
let isLogin = true;
const loginSection = document.getElementById("loginSection");
const challengeSection = document.getElementById("challengeSection");
const authMessage = document.getElementById("authMessage");

function toggleForm(){
    document.getElementById("formTitle").innerText = isLogin ? "Sign Up" : "Login";
    isLogin = !isLogin;
}

function handleAuth(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        authMessage.innerText="Fill all fields!";
        authMessage.classList.add("error");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){
        if(users[username]===password){
            localStorage.setItem("loggedInUser", username);
            showChallenge(username);
        } else {
            authMessage.innerText="Invalid login!";
        }
    } else {
        if(users[username]){
            authMessage.innerText="Username exists!";
        } else {
            users[username]=password;
            localStorage.setItem("users", JSON.stringify(users));
            authMessage.innerText="Account created! Switch to login.";
        }
    }
}

function showChallenge(username){
    loginSection.style.display="none";
    challengeSection.style.display="block";
    document.getElementById("displayUser").innerText=username;
}

function logout(){
    localStorage.removeItem("loggedInUser");
    challengeSection.style.display="none";
    loginSection.style.display="block";
}

window.onload=function(){
    const user=localStorage.getItem("loggedInUser");
    if(user){
        showChallenge(user);
    }
};

/* LOCAL CLEAR IMAGES */
const exercises = {
  easy: [
    {name:"Jumping Jacks", img:"https://spotebi.com/wp-content/uploads/2014/10/jumping-jacks-exercise-illustration.gif",desc:"Do 15 Jumping Jacks."}, 
    {name:"Wall Sit", img:"https://marathonhandbook.com/wp-content/uploads/2022/09/Wall-Sit-Calf-Raise.gif", desc:"Hold for 30 seconds."},
    {name:"Arm Circles", img:"https://cdn.jefit.com/assets/img/exercises/gifs/867.gif", desc:"Do arm circles for 1 minute."},
    {name:"Neck Rolls", img:"https://spotebi.com/wp-content/uploads/2015/03/neck-rolls-exercise-illustration.gif", desc:"Slowly roll your neck for 30 seconds."},
    {name:"Marching in place", img:"https://i.pinimg.com/originals/f9/52/6a/f9526a943772f04f69cda6bcdb5b1d00.gif", desc:"Do Marching in place for 1 minute."}
  ],
moderate:[
{name:"Push-ups",img:"https://nypost.com/wp-content/uploads/sites/2/2019/03/perfect-pushup.gif?w=1000",desc:"Do 15 push-ups."},
{name:"Squats",img:"https://cdn.jefit.com/assets/img/exercises/gifs/493.gif",desc:"Perform 20 squats."},
{name:"Lunges",img:"https://barbend.com/wp-content/uploads/2022/05/lunge-barbend-movement-gif-masters.gif",desc:"Do 20 alternating lunges."},
{name:"Plank",img:"https://barbend.com/wp-content/uploads/2024/01/plank-barbend-movement-gif-masters.gif",desc:"Do Plank for 30 Seconds."},
{name:"Mountain climbers",img:"https://cdn.jefit.com/assets/img/exercises/gifs/484.gif",desc:"Do mountain climbers for 30–60 seconds (or 20–30 per leg)"},
],
hard:[
{name:"Burpees",img:"https://barbend.com/wp-content/uploads/2021/07/burpee-barbend-movement-gif-masters.gif",desc:"Do 20 burpees."},
{name:"Plank",img:"https://cdn.jefit.com/assets/img/exercises/gifs/631.gif",desc:"Hold plank for 1 minute."},
{name:"Jump Squats",img:"https://media.tenor.com/KTAavalOAWQAAAAM/squat-jumps.gif",desc:"Do 20 jump squats."},
{name:"High knees",img:"https://barbend.com/wp-content/uploads/2024/05/high-knees-barbend-movement-gif-masters.gif",desc:"Do high knees for 30–60 seconds."},
{name:"Side plank",img:"https://barbend.com/wp-content/uploads/2022/11/side-plank-barbend-movement-gif-masters-1.gif",desc:"Do 1 minute side plank."},
]
};

const exerciseName=document.getElementById("exerciseName");
const exerciseImage=document.getElementById("exerciseImage");
const exerciseDescription=document.getElementById("exerciseDescription");
const completeBtn=document.getElementById("completeBtn");
const challengeMessage=document.getElementById("challengeMessage");
const streakCount=document.getElementById("streakCount");
const quoteBox=document.getElementById("quoteBox");

let streak=parseInt(localStorage.getItem("fitnessStreak"))||0;
let lastDate=localStorage.getItem("lastCompletedDate")||"";
streakCount.innerText=streak;

function generateChallenge(level){
let list=exercises[level];
let selected=list[Math.floor(Math.random()*list.length)];
exerciseName.innerText=selected.name;
exerciseImage.src=selected.img;
exerciseDescription.innerText=selected.desc;
completeBtn.style.display="block";
challengeMessage.innerText="";
}

const quotes=[
"Push yourself.",
"Success starts with discipline.",
"Small progress is progress.",
"Your only limit is you."
];

completeBtn.addEventListener("click",()=>{
let today=new Date().toDateString();
let yesterday=new Date();
yesterday.setDate(yesterday.getDate()-1);

if(lastDate!==yesterday.toDateString() && lastDate!==today && lastDate!==""){
streak=0;
}

if(lastDate===today){
challengeMessage.innerText="Already completed today!";
return;
}

streak++;
localStorage.setItem("fitnessStreak",streak);
localStorage.setItem("lastCompletedDate",today);
streakCount.innerText=streak;
lastDate=today;

quoteBox.innerText="💬 "+quotes[Math.floor(Math.random()*quotes.length)];
challengeMessage.innerText="Great job! Completed!";
});

</script>
</body>
</html>
