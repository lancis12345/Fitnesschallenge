<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; }
        /* Add your CSS styling here */
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Fitness Challenge</h1>
        <nav>
            <a href="#login">Login</a>
            <a href="#challenges">Challenges</a>
        </nav>
    </header>
    <section id="login">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </section>
    <section id="challenges">
        <h2>Exercise Challenges</h2>
        <button onclick="startChallenge('easy')">Easy Challenge</button>
        <button onclick="startChallenge('moderate')">Moderate Challenge</button>
        <button onclick="startChallenge('hard')">Hard Challenge</button>
    </section>
    <section id="timer">
        <h2>Timer</h2>
        <button onclick="startTimer()">Start Timer</button>
        <div id="timerDisplay">00:00</div>
    </section>
    <section id="streak">
        <h2>Streak Tracking</h2>
        <div id="streakCount">Current Streak: 0</div>
    </section>
    <section id="audio">
        <h2>Audio Features</h2>
        <audio controls>
            <source src="audio/challengeMusic.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>
    <script>
        let currentStreak = 0;
        let timer;
        function startChallenge(level) {
            // Start the challenge depending on the level
            alert('Starting ' + level + ' challenge!');
        }
        function startTimer() {
            // Timer functionality
            let seconds = 0;
            timer = setInterval(() => {
                seconds++;
                document.getElementById('timerDisplay').innerText = new Date(seconds * 1000).toISOString().substr(11, 8);
            }, 1000);
        }
    </script>
</body>
</html>
