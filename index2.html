<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; }
        /* Add more styles as needed */
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Fitness Challenge</h1>
        <nav>
            <ul>
                <li><a href="#login">Login</a></li>
                <li><a href="#exercises">Exercises</a></li>
                <li><a href="#timer">Timer</a></li>
                <li><a href="#streaks">Streaks</a></li>
                <li><a href="#audio">Audio</a></li>
            </ul>
        </nav>
    </header>
    <section id="login">
        <h2>Login System</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </section>
    <section id="exercises">
        <h2>Available Exercises</h2>
        <ul>
            <li>Push-ups</li>
            <li>Squats</li>
            <li>Burpees</li>
            <li>Plank</li>
            <li>Jumping Jacks</li>
        </ul>
    </section>
    <section id="timer">
        <h2>Timer</h2>
        <p>Start your workout!</p>
        <button id="start-timer">Start Timer</button>
        <div id="time-display">00:00</div>
    </section>
    <section id="streaks">
        <h2>Your Streaks</h2>
        <p>Days completed: <span id="streak-count">0</span></p>
    </section>
    <section id="audio">
        <h2>Audio Features</h2>
        <button id="play-audio">Play Audio</button>
    </section>
    <script>
        // JavaScript for timer functionality
        let timer;
        document.getElementById("start-timer").addEventListener("click", function () {
            let seconds = 0;
            timer = setInterval(function () {
                seconds++;
                const minutes = Math.floor(seconds / 60);
                const displayedSeconds = seconds % 60;
                document.getElementById("time-display").innerText = `${minutes}:${displayedSeconds < 10 ? '0' : ''}${displayedSeconds}`;
            }, 1000);
        });

        // Audio functionality
        document.getElementById("play-audio").addEventListener("click", function () {
            const audio = new Audio("your-audio-file.mp3");
            audio.play();
        });
    </script>
</body>
</html>
